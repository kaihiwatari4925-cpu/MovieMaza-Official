<header>
    <div class="logo">CHARIZARD<span>TV</span></div>
    <input type="text" id="search" placeholder="Search Marvel, Anime, Series...">
</header>

<div class="nav-tabs">
    <button class="tab active" onclick="setCategory('movie', 'Marvel')">Movies</button>
    <button class="tab" onclick="setCategory('series', 'Stranger Things')">TV Shows</button>
    <button class="tab" onclick="setCategory('series', 'Naruto')">Anime</button>
</div>

<section class="shelf">
    <h2 class="shelf-title">Featured Stars <i class="fas fa-star"></i></h2>
    <div id="stars-grid" class="horizontal-list">
        <div class="star-card"><img src="https://www.themoviedb.org/t/p/w235_and_h235_face/6o79vVg9YAn719pUOf6897N9Ato.jpg"><p>Salman Khan</p></div>
        <div class="star-card"><img src="https://www.themoviedb.org/t/p/w235_and_h235_face/n676TfC8p3f6YIqEwP7fH24x4oF.jpg"><p>Akshay Kumar</p></div>
        <div class="star-card"><img src="https://www.themoviedb.org/t/p/w235_and_h235_face/869mCCuINBzRzU4fsJu7U3p3jfs.jpg"><p>Shah Rukh Khan</p></div>
    </div>
</section>

<section class="shelf">
    <h2 class="shelf-title">Trending Now</h2>
    <div id="movie-grid" class="horizontal-list"></div>
</section>

<div id="player-modal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <iframe id="video-player" src="" frameborder="0" allowfullscreen></iframe>
        
        <div id="media-controls">
            <div class="control-group">
                <h3>Select Season</h3>
                <select id="season-select" onchange="loadEpisodes()"></select>
            </div>
            <div class="control-group">
                <h3>Audio: <span id="current-audio">Hindi/Dual</span></h3>
            </div>
            <div id="ep-list" class="ep-list"></div>
        </div>
    </div>
</div>
