<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharizardTV - Infinite Library</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">CHARIZARD<span>TV</span></div>
        <div class="search-box">
            <input type="text" id="search" placeholder="Search across 5+ libraries...">
        </div>
    </header>

    <div class="category-tabs">
        <button class="tab-btn active" onclick="switchMode('movie')">Movies</button>
        <button class="tab-btn" onclick="switchMode('tv')">Web Series</button>
        <button class="tab-btn" onclick="switchMode('anime')">Anime</button>
    </div>

    <section id="hero-banner"></section>

    <main>
        <h2 class="shelf-title">Infinite Collection <i class="fas fa-infinite"></i></h2>
        <div id="movie-grid" class="pro-grid"></div>
    </main>

    <div id="player-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closePlayer()">&times;</span>
            <div class="video-container">
                <iframe id="video-player" src="" frameborder="0" allowfullscreen sandbox="allow-forms allow-scripts allow-same-origin"></iframe>
            </div>
            <div id="ep-panel" class="ep-panel">
                <div class="panel-head">
                    <h3>Episodes List</h3>
                    <select id="season-selector" onchange="loadEpisodes()"></select>
                </div>
                <div id="episodes-grid" class="ep-grid"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
