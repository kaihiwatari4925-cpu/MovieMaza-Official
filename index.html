<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharizardTV Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">CHARIZARD<span>TV</span></div>
        <div class="search-trigger" onclick="showPage('search-page')">
            <i class="fas fa-search"></i>
        </div>
    </header>

    <div id="home-page" class="app-page active">
        <div class="hero-slider" id="featured-hero"></div>
        <h2 class="row-title">Trending Movies</h2>
        <div id="movies-row" class="horizontal-row"></div>
    </div>

    <div id="series-page" class="app-page">
        <h2 class="row-title">Popular Web Series</h2>
        <div id="series-grid" class="vertical-grid"></div>
    </div>

    <div id="anime-page" class="app-page">
        <h2 class="row-title">Top Anime Collection</h2>
        <div id="anime-grid" class="vertical-grid"></div>
    </div>

    <div id="search-page" class="app-page">
        <div class="search-header">
            <input type="text" id="main-search" placeholder="Search Marvel, Naruto, etc...">
            <button onclick="performSearch()">Search</button>
        </div>
        <div id="search-results" class="vertical-grid"></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="showPage('home-page')"><i class="fas fa-home"></i><span>Home</span></div>
        <div class="nav-item" onclick="showPage('series-page')"><i class="fas fa-tv"></i><span>Series</span></div>
        <div class="nav-item" onclick="showPage('anime-page')"><i class="fas fa-dragon"></i><span>Anime</span></div>
    </nav>

    <div id="player-modal" class="modal">
        <div class="modal-body">
            <span class="close-modal" onclick="closePlayer()">&times;</span>
            <iframe id="main-video" src="" frameborder="0" allowfullscreen></iframe>
            <div id="ep-selector"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
