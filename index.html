<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0A0E17"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>CharizardTV</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<style>
/* ════════════════════════════════════════════════════
   POKEMON BLUE/BLACK THEME — Android WebView Optimized
   ════════════════════════════════════════════════════ */
:root {
  --blue:      #1D7BF1;
  --blue-dark: #1560c8;
  --cyan:      #00D4FF;
  --cyan-glow: rgba(0,212,255,.35);
  --bg:        #0A0E17;
  --bg2:       #0D1320;
  --bg3:       #131929;
  --bg4:       #1A2233;
  --text:      #FFFFFF;
  --text-dim:  #8892A4;
  --border:    rgba(29,123,241,.25);
  --card-w:    130px;
  --card-h:    195px;
  --nav-h:     68px;
}

/* ── RESET & BASE ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior:smooth; height:100%; }
body {
  font-family:'Poppins', sans-serif;
  background: linear-gradient(135deg, #0A0E17 0%, #000000 100%);
  background-attachment: fixed;
  color: var(--text);
  min-height:100vh;
  padding-bottom: var(--nav-h);
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}

/* ── POKEBALL SVG LOGO ── */
.logo {
  display:flex; align-items:center; gap:10px; text-decoration:none;
  font-family:'Orbitron', sans-serif;
  font-size:1.25rem; font-weight:900; letter-spacing:1px;
  color:#fff;
}
.logo-text span { color: var(--cyan); }
.pokeball {
  width:32px; height:32px; flex-shrink:0;
  filter: drop-shadow(0 0 8px var(--cyan));
}

/* ── HEADER ── */
header {
  position:fixed; top:0; left:0; right:0; z-index:200;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; height:58px;
  background: linear-gradient(to bottom, rgba(10,14,23,.98) 0%, transparent 100%);
  transition: background .3s;
}
header.solid {
  background: rgba(10,14,23,.98);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 4px 24px rgba(0,0,0,.6);
}
.header-search {
  display:flex; align-items:center;
  background: rgba(29,123,241,.08);
  border: 1px solid var(--border);
  border-radius:24px; overflow:hidden;
  transition: all .3s; max-width:180px;
}
.header-search:focus-within {
  background: rgba(29,123,241,.15);
  border-color: var(--cyan);
  box-shadow: 0 0 12px var(--cyan-glow);
  max-width:220px;
}
.header-search input {
  background:none; border:none; outline:none;
  color:#fff; font-family:'Poppins',sans-serif; font-size:.82rem;
  padding:7px 12px; width:130px; min-width:0;
}
.header-search input::placeholder { color:var(--text-dim); }
.header-search button {
  background:none; border:none; color:var(--text-dim);
  padding:7px 12px; cursor:pointer; transition:color .2s;
  font-size:.85rem;
}
.header-search button:hover, .header-search button:active { color:var(--cyan); }

/* ── PAGES ── */
.page { display:none; }
.page.active { display:block; }

/* ── HERO SECTION ── */
.hero {
  position:relative; height:72vw; min-height:260px; max-height:480px;
  display:flex; align-items:flex-end;
  background: linear-gradient(135deg, #050d1a 0%, #0A0E17 100%);
  overflow:hidden; margin-bottom:0;
}
.hero-bg {
  position:absolute; inset:0;
  background-size:cover; background-position:center top;
  filter:brightness(.42) saturate(1.1);
  transition:background-image .5s;
}
.hero-gradient {
  position:absolute; inset:0;
  background:
    linear-gradient(to top, #0A0E17 0%, rgba(10,14,23,.6) 40%, transparent 70%),
    linear-gradient(to right, rgba(10,14,23,.9) 0%, transparent 65%);
}
.hero-scan {
  position:absolute; inset:0; pointer-events:none;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 3px,
    rgba(29,123,241,.03) 3px, rgba(29,123,241,.03) 4px
  );
}
.hero-content {
  position:relative; z-index:2;
  padding:0 18px 24px; width:100%;
}
.hero-badge {
  display:inline-flex; align-items:center; gap:5px;
  background: linear-gradient(90deg, var(--blue), var(--cyan));
  font-size:.62rem; font-weight:700; letter-spacing:2px;
  padding:3px 10px; border-radius:20px; margin-bottom:10px;
  text-transform:uppercase; color:#fff;
}
.hero-title {
  font-family:'Orbitron', sans-serif;
  font-size:clamp(1.4rem, 6vw, 2.8rem); line-height:1.1;
  margin-bottom:6px; font-weight:900;
  text-shadow:0 0 30px rgba(0,212,255,.3), 2px 2px 12px rgba(0,0,0,.9);
}
.hero-meta {
  color:var(--text-dim); font-size:.75rem; margin-bottom:8px;
  display:flex; gap:10px; flex-wrap:wrap;
}
.hero-meta span { display:flex; align-items:center; gap:4px; }
.hero-desc {
  font-size:.78rem; color:#b0bec5; line-height:1.5;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
  overflow:hidden; margin-bottom:14px; max-width:340px;
}
.hero-actions { display:flex; gap:10px; flex-wrap:wrap; }
.btn {
  display:inline-flex; align-items:center; gap:7px;
  padding:9px 20px; border-radius:24px;
  font-family:'Poppins',sans-serif; font-weight:700; font-size:.82rem;
  cursor:pointer; border:none; transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.btn-primary {
  background: linear-gradient(90deg, var(--blue), #1560D4);
  color:#fff; box-shadow:0 4px 20px rgba(29,123,241,.4);
}
.btn-primary:active { transform:scale(.96); box-shadow:none; }
.btn-secondary {
  background: rgba(255,255,255,.08);
  color:#fff; border:1px solid rgba(255,255,255,.2);
}
.btn-secondary:active { background:rgba(255,255,255,.15); }

/* ── CENTER HERO SEARCH (Home page focal element) ── */
.hero-search-wrap {
  position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
  width:90%; max-width:440px; z-index:3;
  display:none; /* shown only on home when no results */
}
.hero-search-wrap.visible { display:block; }
.hero-search-box {
  display:flex; align-items:center;
  background: rgba(10,14,23,.7);
  border:1.5px solid var(--border);
  border-radius:30px; overflow:hidden;
  backdrop-filter:blur(12px);
  transition:all .3s;
  box-shadow:0 4px 30px rgba(0,0,0,.5);
}
.hero-search-box:focus-within {
  border-color: var(--cyan);
  box-shadow:0 0 24px var(--cyan-glow), 0 4px 30px rgba(0,0,0,.5);
}
.hero-search-box input {
  flex:1; background:none; border:none; outline:none;
  color:#fff; font-family:'Poppins',sans-serif; font-size:.95rem;
  padding:13px 18px;
}
.hero-search-box input::placeholder { color:var(--text-dim); }
.hero-search-box button {
  background: linear-gradient(90deg, var(--blue), var(--cyan));
  border:none; color:#fff;
  padding:0 20px; height:100%; min-height:46px;
  font-size:1rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}

/* ── SHELVES ── */
.shelf { margin-bottom:28px; }
.shelf-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px 10px;
}
.shelf-title {
  font-family:'Orbitron', sans-serif;
  font-size:1rem; letter-spacing:.5px; color:#fff; font-weight:700;
}
.shelf-title span { color:var(--cyan); }
.shelf-row {
  display:flex; gap:10px; overflow-x:auto;
  padding:4px 16px 10px; scroll-snap-type:x mandatory;
  scrollbar-width:none; -webkit-overflow-scrolling:touch;
}
.shelf-row::-webkit-scrollbar { display:none; }

/* ── CARDS ── */
.card {
  flex:0 0 var(--card-w); height:var(--card-h);
  border-radius:10px; overflow:hidden; cursor:pointer;
  scroll-snap-align:start; position:relative;
  background:var(--bg3);
  border:1px solid transparent;
  transition:transform .2s, box-shadow .2s, border-color .2s;
  -webkit-tap-highlight-color:transparent;
}
.card:active {
  transform:scale(.94);
  box-shadow:0 6px 24px rgba(0,212,255,.3);
  border-color:var(--cyan);
}
.card img { width:100%; height:100%; object-fit:cover; display:block; }
.card-overlay {
  position:absolute; inset:0;
  background:linear-gradient(to top, rgba(10,14,23,.95) 0%, transparent 55%);
  display:flex; align-items:flex-end; padding:8px;
}
.card-name { font-size:.68rem; font-weight:700; line-height:1.2; color:#fff; }
.card-year { font-size:.62rem; color:var(--cyan); margin-top:2px; }
.card-placeholder {
  width:100%; height:100%;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:10px; text-align:center; gap:7px;
  background:linear-gradient(135deg, var(--bg3), var(--bg4));
}
.card-placeholder i { font-size:1.8rem; color:var(--blue); opacity:.7; }
.card-placeholder span { font-size:.65rem; color:var(--text-dim); }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; z-index:200;
  display:flex; height:var(--nav-h);
  background: rgba(10,14,23,.97);
  border-top:1px solid var(--border);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}
.nav-item {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; cursor:pointer;
  color:var(--text-dim); font-size:.62rem; font-weight:600;
  transition:all .2s; gap:4px; border:none; background:none;
  padding:8px 0; position:relative;
  -webkit-tap-highlight-color:transparent;
}
.nav-item i { font-size:1.25rem; transition:all .2s; }
.nav-item::after {
  content:''; position:absolute; bottom:0; left:50%;
  transform:translateX(-50%);
  width:0; height:2px;
  background:linear-gradient(90deg, var(--blue), var(--cyan));
  border-radius:2px; transition:width .25s;
}
.nav-item.active::after { width:32px; }
.nav-item.active { color:var(--cyan); }
.nav-item.active i { transform:translateY(-2px) scale(1.1); color:var(--cyan); }

/* ── MODAL ── */
.modal-overlay {
  display:none; position:fixed; inset:0; z-index:300;
  background:rgba(0,0,0,.88);
  backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
  overflow-y:auto; -webkit-overflow-scrolling:touch;
}
.modal-overlay.open { display:block; }
.modal {
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:16px; margin:16px auto;
  max-width:720px; width:95%; overflow:hidden; position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,.9), 0 0 40px rgba(0,212,255,.05);
  animation:modalIn .28s cubic-bezier(.34,1.56,.64,1);
}
@keyframes modalIn {
  from { opacity:0; transform:scale(.93) translateY(24px); }
  to   { opacity:1; transform:scale(1)   translateY(0); }
}
.modal-hero {
  height:220px; background-size:cover; background-position:center;
  position:relative;
}
.modal-hero-grad {
  position:absolute; inset:0;
  background:linear-gradient(to top, var(--bg2) 0%, rgba(13,19,32,.4) 60%, transparent 100%);
}
.modal-close {
  position:absolute; top:12px; right:12px;
  background:rgba(10,14,23,.8); border:1px solid var(--border);
  color:#fff; width:34px; height:34px; border-radius:50%;
  font-size:.9rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .2s; z-index:2;
}
.modal-close:active { background:var(--blue); border-color:var(--blue); }
.modal-body { padding:0 18px 20px; }
.modal-title {
  font-family:'Orbitron', sans-serif;
  font-size:1.35rem; line-height:1.1; margin-bottom:8px; font-weight:900;
}
.modal-meta {
  color:var(--text-dim); font-size:.72rem; margin-bottom:10px;
  display:flex; gap:10px; flex-wrap:wrap;
}
.modal-meta span { display:flex; align-items:center; gap:4px; }
.modal-meta i { color:var(--cyan); }
.modal-desc {
  font-size:.8rem; color:#b0bec5; line-height:1.6; margin-bottom:16px;
  display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden;
}
.modal-actions { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
.modal-stream-btn {
  padding:11px 24px;
  background:linear-gradient(90deg, var(--blue), #1067E0);
  color:#fff; border:none; border-radius:24px;
  font-family:'Poppins',sans-serif; font-weight:700; font-size:.9rem;
  cursor:pointer; display:flex; align-items:center; gap:8px;
  transition:all .2s; box-shadow:0 4px 20px rgba(29,123,241,.4);
  -webkit-tap-highlight-color:transparent;
}
.modal-stream-btn:active { transform:scale(.96); box-shadow:none; }

/* ── EPISODES ── */
.episodes-section {
  border-top:1px solid var(--border); padding-top:16px;
}
.ep-controls {
  display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap;
}
.ep-controls label { font-weight:700; font-size:.82rem; color:var(--cyan); }
select {
  background:var(--bg3); color:#fff;
  border:1px solid var(--border);
  border-radius:8px; padding:7px 12px;
  font-family:'Poppins',sans-serif; font-size:.8rem;
  cursor:pointer; outline:none;
}
select:focus { border-color:var(--cyan); }
.ep-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(52px, 1fr));
  gap:7px;
}
.ep-btn {
  background:var(--bg3); border:1px solid var(--border);
  color:var(--text-dim); border-radius:7px; padding:8px 4px;
  font-family:'Poppins',sans-serif; font-size:.75rem; font-weight:600;
  cursor:pointer; text-align:center; transition:all .18s;
  -webkit-tap-highlight-color:transparent;
}
.ep-btn:active, .ep-btn.active {
  background:linear-gradient(90deg, var(--blue), var(--cyan));
  color:#fff; border-color:transparent;
  box-shadow:0 2px 10px rgba(0,212,255,.3);
}

/* ── FULLSCREEN PLAYER ── */
.player-wrap {
  display:none; position:fixed; inset:0; z-index:400;
  background:#000; flex-direction:column;
}
.player-wrap.open { display:flex; }
.player-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 14px;
  background:rgba(10,14,23,.95);
  border-bottom:1px solid var(--border);
  flex-shrink:0; height:50px;
}
.player-title {
  font-family:'Orbitron',sans-serif; font-size:1rem; font-weight:700;
  color:var(--cyan); white-space:nowrap; overflow:hidden;
  text-overflow:ellipsis; flex:1; margin-right:12px;
}
.player-close {
  background:linear-gradient(90deg, var(--blue), #1a60d0);
  border:none; color:#fff;
  padding:6px 16px; border-radius:20px;
  font-family:'Poppins',sans-serif; font-weight:700; font-size:.8rem;
  cursor:pointer; flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}
.player-iframe { flex:1; border:none; width:100%; display:block; }

/* ── SEARCH PAGE ── */
.search-page-header {
  padding:76px 16px 16px;
  font-family:'Orbitron',sans-serif; font-size:1.1rem; font-weight:700;
}
.search-page-header span { color:var(--cyan); }
.search-results-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(120px, 1fr));
  gap:12px; padding:0 16px 16px;
}
.search-results-grid .card { flex:none; width:100%; height:180px; }

/* ── PULL TO REFRESH ── */
.ptr-indicator {
  position:fixed; top:58px; left:50%; transform:translateX(-50%) translateY(-60px);
  background:var(--bg3); border:1px solid var(--border);
  border-radius:24px; padding:8px 20px;
  display:flex; align-items:center; gap:8px;
  font-size:.78rem; color:var(--cyan);
  font-family:'Poppins',sans-serif; font-weight:600;
  transition:transform .3s, opacity .3s; opacity:0; z-index:150;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
}
.ptr-indicator.pulling { opacity:1; transform:translateX(-50%) translateY(0); }
.ptr-indicator.refreshing { opacity:1; transform:translateX(-50%) translateY(0); }
.ptr-spinner {
  width:16px; height:16px;
  border:2px solid rgba(0,212,255,.3);
  border-top-color:var(--cyan); border-radius:50%;
}
.ptr-indicator.refreshing .ptr-spinner { animation:spin .7s linear infinite; }

/* ── LOADING / EMPTY ── */
.loading {
  display:flex; align-items:center; justify-content:center;
  height:180px; color:var(--text-dim); gap:10px; font-size:.85rem;
}
.spinner {
  width:24px; height:24px;
  border:2.5px solid rgba(0,212,255,.2);
  border-top-color:var(--cyan); border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.empty {
  text-align:center; padding:50px 20px; color:var(--text-dim);
}
.empty i { font-size:2.5rem; color:var(--blue); opacity:.4; margin-bottom:12px; display:block; }

/* ── PAGE PADDING ── */
#page-home .hero { margin-top:0; }
#page-movies .shelf:first-child,
#page-series .shelf:first-child,
#page-anime  .shelf:first-child { padding-top:70px; }

/* ── SCAN LINE OVERLAY (Pokemon feel) ── */
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:1;
  background:repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,.06) 2px, rgba(0,0,0,.06) 3px
  );
}

/* ── ANDROID SAFE AREA ── */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  body { padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom)); }
  .bottom-nav { padding-bottom:env(safe-area-inset-bottom); height:calc(var(--nav-h) + env(safe-area-inset-bottom)); }
}

/* ── LANDSCAPE PLAYER ── */
@media (orientation:landscape) {
  .player-header { height:44px; padding:8px 14px; }
  .player-title  { font-size:.85rem; }
}
</style>
</head>
<body>

<!-- PULL TO REFRESH INDICATOR -->
<div class="ptr-indicator" id="ptr-indicator">
  <div class="ptr-spinner"></div>
  <span id="ptr-text">Pull to refresh</span>
</div>

<!-- ═══ HEADER ═══ -->
<header id="main-header">
  <!-- Pokemon Blue Pokeball Logo (pure SVG+CSS) -->
  <div class="logo">
    <svg class="pokeball" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="pg" cx="40%" cy="35%">
          <stop offset="0%" stop-color="#00FFFF" stop-opacity=".9"/>
          <stop offset="100%" stop-color="#1D7BF1" stop-opacity=".6"/>
        </radialGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <!-- Outer ring -->
      <circle cx="20" cy="20" r="18" stroke="#1D7BF1" stroke-width="1.5" fill="none" filter="url(#glow)"/>
      <!-- Top half -->
      <path d="M2 20 A18 18 0 0 1 38 20 Z" fill="url(#pg)" opacity=".8"/>
      <!-- Divider line -->
      <line x1="2" y1="20" x2="38" y2="20" stroke="#00D4FF" stroke-width="1.5"/>
      <!-- Center button outer -->
      <circle cx="20" cy="20" r="5.5" fill="#0A0E17" stroke="#1D7BF1" stroke-width="1.5"/>
      <!-- Center button inner glow -->
      <circle cx="20" cy="20" r="3" fill="none" stroke="#00FFFF" stroke-width="1" opacity=".9"/>
      <circle cx="20" cy="20" r="1.5" fill="#00FFFF"/>
    </svg>
    <span class="logo-text">CHARIZARD<span>TV</span></span>
  </div>

  <!-- Header Search Bar -->
  <div class="header-search" id="header-search">
    <input type="search" id="search-input" placeholder="Search..." autocomplete="off" enterkeyhint="search"/>
    <button onclick="doSearch()" aria-label="Search"><i class="fas fa-search"></i></button>
  </div>
</header>

<!-- ═══ PAGES ═══ -->

<!-- HOME PAGE -->
<div id="page-home" class="page active">
  <div class="hero" id="hero-home">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-gradient"></div>
    <div class="hero-scan"></div>
    <div class="hero-content" id="hero-content">
      <div class="hero-badge" id="hero-badge"><i class="fas fa-bolt"></i> TRENDING NOW</div>
      <div class="hero-title" id="hero-title">Loading...</div>
      <div class="hero-meta" id="hero-meta"></div>
      <div class="hero-desc" id="hero-desc"></div>
      <div class="hero-actions">
        <button class="btn btn-primary" id="hero-play-btn"><i class="fas fa-play"></i> Play Now</button>
        <button class="btn btn-secondary" id="hero-info-btn"><i class="fas fa-info-circle"></i> Info</button>
      </div>
    </div>
  </div>

  <div class="shelf" style="padding-top:18px">
    <div class="shelf-header"><div class="shelf-title">⚡ <span>Trending</span> Movies</div></div>
    <div class="shelf-row" id="shelf-trending"></div>
