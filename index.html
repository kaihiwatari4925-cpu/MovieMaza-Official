<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0A0E17"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>CharizardTV</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════════════════
   CHARIZARD TV — MULTI-SERVER OTT BUILD
   Blue/Black Pokémon Theme · Android WebView Optimised
   ═══════════════════════════════════════════════════════════ */
:root{
  --blue:#1D7BF1;--blue-d:#1255C0;--cyan:#00D4FF;
  --cyan-glow:rgba(0,212,255,.30);
  --bg:#0A0E17;--bg2:#0D1320;--bg3:#131929;--bg4:#1A2233;
  --text:#FFF;--dim:#8892A4;--border:rgba(29,123,241,.20);
  --gold:#FFD700;--red:#FF3B5C;--green:#00E676;
  --card-w:130px;--card-h:195px;--nav-h:68px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;scroll-behavior:smooth}
body{
  font-family:'Poppins',sans-serif;
  background:radial-gradient(ellipse at 18% 0%,#0c1d38 0%,#0A0E17 50%,#000 100%);
  background-attachment:fixed;color:var(--text);
  min-height:100vh;padding-bottom:var(--nav-h);
  overflow-x:hidden;-webkit-overflow-scrolling:touch;
}

/* ── HEADER ── */
header{
  position:fixed;top:0;left:0;right:0;z-index:500;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:58px;
  background:linear-gradient(to bottom,rgba(10,14,23,.97) 0%,transparent 100%);
  transition:background .3s,box-shadow .3s;
}
header.solid{background:rgba(10,14,23,.97);border-bottom:1px solid var(--border);box-shadow:0 2px 24px rgba(0,0,0,.75)}
.logo{display:flex;align-items:center;gap:9px;font-family:'Orbitron',sans-serif;font-size:1.2rem;font-weight:900;letter-spacing:1.5px;color:#fff;text-decoration:none;flex-shrink:0}
.logo em{color:var(--cyan);font-style:normal}
.pokeball{width:30px;height:30px;flex-shrink:0;filter:drop-shadow(0 0 7px var(--cyan))}
.h-search{display:flex;align-items:center;background:rgba(29,123,241,.08);border:1px solid var(--border);border-radius:22px;overflow:hidden;transition:all .25s;max-width:185px}
.h-search:focus-within{background:rgba(29,123,241,.14);border-color:var(--cyan);box-shadow:0 0 14px var(--cyan-glow);max-width:240px}
.h-search input{background:none;border:none;outline:none;color:#fff;font-family:'Poppins',sans-serif;font-size:.82rem;padding:7px 12px;width:130px;min-width:0}
.h-search input::placeholder{color:var(--dim)}
.h-search button{background:none;border:none;color:var(--dim);padding:7px 11px;cursor:pointer;font-size:.84rem;transition:color .2s;flex-shrink:0}
.h-search button:active{color:var(--cyan)}

/* ── PAGES ── */
.page{display:none}.page.active{display:block}

/* ── HERO ── */
.hero{position:relative;height:72vw;min-height:265px;max-height:490px;display:flex;align-items:flex-end;overflow:hidden;background:linear-gradient(135deg,#050d1a 0%,#0A0E17 100%)}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center top;filter:brightness(.40) saturate(1.15);transition:background-image .55s}
.hero-grad{position:absolute;inset:0;background:linear-gradient(to top,#0A0E17 0%,rgba(10,14,23,.65) 38%,transparent 68%),linear-gradient(to right,rgba(10,14,23,.92) 0%,transparent 62%)}
.hero-scan{position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(29,123,241,.025) 3px,rgba(29,123,241,.025) 4px)}
.hero-content{position:relative;z-index:2;padding:0 18px 26px;width:100%}
.hero-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(90deg,var(--blue),var(--cyan));font-size:.6rem;font-weight:700;letter-spacing:2px;padding:3px 10px;border-radius:20px;margin-bottom:10px;text-transform:uppercase;color:#fff}
.hero-title{font-family:'Orbitron',sans-serif;font-size:clamp(1.35rem,5.8vw,2.7rem);line-height:1.1;margin-bottom:6px;font-weight:900;text-shadow:0 0 28px rgba(0,212,255,.28),2px 2px 10px rgba(0,0,0,.9)}
.hero-meta{color:var(--dim);font-size:.73rem;margin-bottom:8px;display:flex;gap:10px;flex-wrap:wrap}
.hero-meta span{display:flex;align-items:center;gap:4px}
.hero-desc{font-size:.77rem;color:#b0bec5;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:14px;max-width:340px}
.hero-btns{display:flex;gap:9px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 20px;border-radius:22px;font-family:'Poppins',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;border:none;transition:all .2s;-webkit-tap-highlight-color:transparent}
.btn-play{background:linear-gradient(90deg,var(--blue),var(--blue-d));color:#fff;box-shadow:0 4px 18px rgba(29,123,241,.45)}
.btn-play:active{transform:scale(.95);box-shadow:none}
.btn-info{background:rgba(255,255,255,.09);color:#fff;border:1px solid rgba(255,255,255,.18)}
.btn-info:active{background:rgba(255,255,255,.17)}

/* ── SHELVES ── */
.shelf{margin-bottom:26px}
.shelf-hd{display:flex;align-items:center;justify-content:space-between;padding:0 16px 9px}
.shelf-title{font-family:'Orbitron',sans-serif;font-size:.95rem;letter-spacing:.4px;color:#fff;font-weight:700}
.shelf-title em{color:var(--cyan);font-style:normal}
.shelf-row{display:flex;gap:10px;overflow-x:auto;padding:4px 16px 10px;scroll-snap-type:x mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.shelf-row::-webkit-scrollbar{display:none}

/* ── CARDS ── */
.card{flex:0 0 var(--card-w);height:var(--card-h);border-radius:10px;overflow:hidden;cursor:pointer;scroll-snap-align:start;position:relative;background:var(--bg3);border:1px solid transparent;transition:transform .18s,box-shadow .18s,border-color .18s;-webkit-tap-highlight-color:transparent}
.card:active{transform:scale(.93);box-shadow:0 6px 22px rgba(0,212,255,.28);border-color:var(--cyan)}
.card img{width:100%;height:100%;object-fit:cover;display:block}
.card-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,14,23,.96) 0%,transparent 52%);display:flex;align-items:flex-end;padding:8px}
.c-info{width:100%}
.c-name{font-size:.67rem;font-weight:700;line-height:1.2;color:#fff}
.c-year{font-size:.61rem;color:var(--cyan);margin-top:2px}

/* ── LANGUAGE TAGS on cards ── */
.lang-strip{
  position:absolute;top:7px;left:0;right:0;
  display:flex;gap:3px;padding:0 7px;flex-wrap:wrap;
}
.ltag{
  font-size:.52rem;font-weight:800;letter-spacing:.5px;
  padding:2px 5px;border-radius:5px;
  text-transform:uppercase;line-height:1.2;
}
.ltag-hi{background:rgba(255,153,0,.85);color:#000}
.ltag-en{background:rgba(29,123,241,.85);color:#fff}
.ltag-jp{background:rgba(220,38,38,.85);color:#fff}
.ltag-sub{background:rgba(0,212,255,.15);border:1px solid rgba(0,212,255,.5);color:var(--cyan)}

.card-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;text-align:center;gap:7px;background:linear-gradient(135deg,var(--bg3),var(--bg4))}
.card-ph i{font-size:1.8rem;color:var(--blue);opacity:.6}
.card-ph span{font-size:.64rem;color:var(--dim);line-height:1.3}

/* Skeleton shimmer */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.sk{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:400px 100%;animation:shimmer 1.3s infinite}
.sk-img{width:100%;height:75%;border-radius:8px 8px 0 0}
.sk-line{height:9px;border-radius:4px;margin:5px 8px}
.sk-sm{width:50%}

/* ── BOTTOM NAV ── */
.bot-nav{position:fixed;bottom:0;left:0;right:0;z-index:500;display:flex;height:var(--nav-h);background:rgba(10,14,23,.97);border-top:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--dim);font-size:.6rem;font-weight:600;transition:all .2s;gap:4px;border:none;background:none;padding:8px 0;position:relative;-webkit-tap-highlight-color:transparent}
.nav-btn i{font-size:1.2rem;transition:all .2s}
.nav-btn::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:2px;transition:width .22s}
.nav-btn.active::after{width:30px}
.nav-btn.active{color:var(--cyan)}
.nav-btn.active i{transform:translateY(-2px) scale(1.12);color:var(--cyan)}

/* ── MODAL ── */
.m-overlay{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.88);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);overflow-y:auto;-webkit-overflow-scrolling:touch}
.m-overlay.open{display:block}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;margin:14px auto;max-width:720px;width:95%;overflow:hidden;position:relative;box-shadow:0 22px 60px rgba(0,0,0,.9),0 0 38px rgba(0,212,255,.04);animation:mIn .26s cubic-bezier(.34,1.56,.64,1)}
@keyframes mIn{from{opacity:0;transform:scale(.92) translateY(22px)}to{opacity:1;transform:scale(1) translateY(0)}}
.m-hero{height:215px;background-size:cover;background-position:center;position:relative;background-color:var(--bg3)}
.m-hero-grad{position:absolute;inset:0;background:linear-gradient(to top,var(--bg2) 0%,rgba(13,19,32,.4) 58%,transparent 100%)}
.m-close{position:absolute;top:11px;right:11px;z-index:2;background:rgba(10,14,23,.82);border:1px solid var(--border);color:#fff;width:34px;height:34px;border-radius:50%;font-size:.88rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s}
.m-close:active{background:var(--blue);border-color:var(--blue)}
.m-body{padding:0 18px 22px}
.m-title{font-family:'Orbitron',sans-serif;font-size:1.3rem;line-height:1.1;margin-bottom:8px;font-weight:900}
.m-meta{color:var(--dim);font-size:.71rem;margin-bottom:6px;display:flex;gap:10px;flex-wrap:wrap}
.m-meta span{display:flex;align-items:center;gap:4px}
.m-meta i{color:var(--cyan)}
.m-lang-row{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.m-ltag{font-size:.65rem;font-weight:800;letter-spacing:.6px;padding:3px 9px;border-radius:8px;text-transform:uppercase}
.m-ltag-hi{background:rgba(255,153,0,.18);border:1px solid rgba(255,153,0,.5);color:#ffa726}
.m-ltag-en{background:rgba(29,123,241,.18);border:1px solid rgba(29,123,241,.5);color:#64b5f6}
.m-ltag-jp{background:rgba(220,38,38,.18);border:1px solid rgba(220,38,38,.5);color:#ef9a9a}
.m-ltag-sub{background:rgba(0,212,255,.12);border:1px solid rgba(0,212,255,.4);color:var(--cyan)}
.m-desc{font-size:.79rem;color:#b0bec5;line-height:1.6;margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
.m-actions{display:flex;gap:9px;margin-bottom:18px;flex-wrap:wrap}
.stream-btn{padding:11px 22px;background:linear-gradient(90deg,var(--blue),var(--blue-d));color:#fff;border:none;border-radius:22px;font-family:'Poppins',sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 4px 18px rgba(29,123,241,.42);transition:all .2s;-webkit-tap-highlight-color:transparent}
.stream-btn:active{transform:scale(.95);box-shadow:none}
.trailer-btn{padding:11px 20px;background:rgba(255,255,255,.06);color:#fff;border:1px solid var(--border);border-radius:22px;font-family:'Poppins',sans-serif;font-weight:700;font-size:.88rem;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .2s;-webkit-tap-highlight-color:transparent}
.trailer-btn:active{background:rgba(255,255,255,.12)}

/* Modal server tabs */
.m-srv-wrap{margin-bottom:16px}
.m-srv-label{font-size:.73rem;color:var(--dim);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.m-srv-label i{color:var(--cyan)}
.m-srv-tabs{display:flex;gap:6px;flex-wrap:wrap}
.m-srv-tab{padding:6px 13px;border-radius:18px;font-size:.72rem;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--dim);transition:all .18s;font-family:'Poppins',sans-serif;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;gap:5px}
.m-srv-tab.on{background:linear-gradient(90deg,var(--blue),var(--cyan));color:#fff;border-color:transparent;box-shadow:0 2px 10px rgba(0,212,255,.28)}
.srv-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.m-srv-tab .srv-name{font-size:.72rem}
.m-srv-tab .srv-sub{font-size:.58rem;opacity:.8;display:block;margin-top:1px}

/* Episode UI */
.ep-section{border-top:1px solid var(--border);padding-top:15px;margin-top:2px}
.ep-ctrl{display:flex;align-items:center;gap:9px;margin-bottom:13px;flex-wrap:wrap}
.ep-ctrl label{font-weight:700;font-size:.8rem;color:var(--cyan)}
select{background:var(--bg3);color:#fff;border:1px solid var(--border);border-radius:8px;padding:6px 11px;font-family:'Poppins',sans-serif;font-size:.78rem;cursor:pointer;outline:none}
select:focus{border-color:var(--cyan)}
.ep-count{font-size:.7rem;color:var(--dim)}
.ep-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(50px,1fr));gap:6px;max-height:180px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--blue) var(--bg3)}
.ep-grid::-webkit-scrollbar{width:4px}
.ep-grid::-webkit-scrollbar-track{background:var(--bg3)}
.ep-grid::-webkit-scrollbar-thumb{background:var(--blue);border-radius:4px}
.ep-btn{background:var(--bg3);border:1px solid var(--border);color:var(--dim);border-radius:7px;padding:7px 3px;font-family:'Poppins',sans-serif;font-size:.73rem;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;-webkit-tap-highlight-color:transparent}
.ep-btn.on,.ep-btn:active{background:linear-gradient(90deg,var(--blue),var(--cyan));color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(0,212,255,.28)}

/* ── FULLSCREEN PLAYER ── */
.player{display:none;position:fixed;inset:0;z-index:700;background:#000;flex-direction:column}
.player.open{display:flex}

/* Player Header */
.p-header{display:flex;align-items:center;gap:8px;padding:9px 13px;background:rgba(10,14,23,.96);border-bottom:1px solid var(--border);flex-shrink:0;height:50px}
.p-title{font-family:'Orbitron',sans-serif;font-size:.88rem;font-weight:700;color:var(--cyan);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.p-close{background:linear-gradient(90deg,var(--blue),var(--blue-d));border:none;color:#fff;padding:5px 13px;border-radius:18px;font-family:'Poppins',sans-serif;font-weight:700;font-size:.77rem;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent}

/* ★ MULTI-SERVER SWITCHER BAR (below player) */
.p-server-bar{
  flex-shrink:0;
  background:rgba(10,14,23,.96);
  border-bottom:1px solid var(--border);
  padding:8px 12px;
  display:flex;align-items:center;gap:8px;
  overflow-x:auto;scrollbar-width:none;
}
.p-server-bar::-webkit-scrollbar{display:none}
.p-server-bar-label{
  font-size:.65rem;font-weight:700;color:var(--dim);
  white-space:nowrap;flex-shrink:0;
  font-family:'Poppins',sans-serif;
}
.p-srv-btn{
  flex-shrink:0;
  padding:5px 13px;border-radius:16px;
  font-size:.7rem;font-weight:700;cursor:pointer;
  border:1px solid var(--border);background:var(--bg3);
  color:var(--dim);transition:all .18s;
  font-family:'Poppins',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  gap:2px;-webkit-tap-highlight-color:transparent;
  min-width:60px;
}
.p-srv-btn .srv-n{font-size:.7rem;font-weight:700}
.p-srv-btn .srv-s{font-size:.58rem;opacity:.75}
.p-srv-btn.on{
  background:linear-gradient(90deg,var(--blue),var(--cyan));
  color:#fff;border-color:transparent;
  box-shadow:0 2px 12px rgba(0,212,255,.3);
}
.p-srv-btn:active{transform:scale(.95)}

/* Notice bar inside player */
.p-notice{
  flex-shrink:0;
  background:rgba(255,200,0,.07);
  border-bottom:1px solid rgba(255,200,0,.15);
  padding:6px 14px;
  display:flex;align-items:center;gap:8px;
  font-size:.68rem;color:rgba(255,220,80,.9);
  font-family:'Poppins',sans-serif;
}
.p-notice i{color:var(--gold);font-size:.8rem;flex-shrink:0}

.p-frame-wrap{flex:1;position:relative;overflow:hidden}

/* Loading overlay */
.p-loading{position:absolute;inset:0;z-index:10;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .45s}
.p-loading.hide{opacity:0;pointer-events:none}
.p-spin{width:52px;height:52px;border:3px solid rgba(0,212,255,.15);border-top-color:var(--cyan);border-radius:50%;animation:spin .65s linear infinite}
.p-load-title{font-family:'Orbitron',sans-serif;font-size:.9rem;font-weight:700;color:var(--cyan);letter-spacing:1px}
.p-load-sub{font-size:.72rem;color:var(--dim);text-align:center;padding:0 20px}

/*
  SANDBOXED IFRAME
  allow-popups intentionally OMITTED → blocks ALL popup ads
  allow-scripts      → player JS
  allow-forms        → embed player form posts
  allow-same-origin  → postMessage/storage
  allow-presentation → fullscreen API
*/
.p-iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:block;background:#000}

/* ── SEARCH PAGE ── */
.srch-hd{padding:76px 16px 14px;font-family:'Orbitron',sans-serif;font-size:1.05rem;font-weight:700}
.srch-hd em{color:var(--cyan);font-style:normal}
.srch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:11px;padding:0 16px 16px}
.srch-grid .card{flex:none;width:100%;height:178px}

/* ── STATUS ── */
.loading-row{display:flex;align-items:center;justify-content:center;height:175px;color:var(--dim);gap:9px;font-size:.83rem}
.spin{width:22px;height:22px;border:2px solid rgba(0,212,255,.18);border-top-color:var(--cyan);border-radius:50%;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:40px 20px;color:var(--dim)}
.empty-state i{font-size:2.4rem;color:var(--blue);opacity:.38;margin-bottom:10px;display:block}
.empty-state p{font-size:.82rem}
.reload-row{text-align:center;padding:8px 16px 16px}
.reload-btn{display:inline-flex;align-items:center;gap:7px;padding:9px 20px;border-radius:20px;background:linear-gradient(90deg,var(--blue),var(--cyan));color:#fff;border:none;font-family:'Poppins',sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;box-shadow:0 4px 16px rgba(0,212,255,.25);-webkit-tap-highlight-color:transparent}
.reload-btn:active{transform:scale(.96)}

/* Page offsets */
#pg-movies .shelf:first-child,#pg-series .shelf:first-child,#pg-anime .shelf:first-child{padding-top:68px}

/* Scanlines */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:1;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.055) 2px,rgba(0,0,0,.055) 3px)}

/* Safe areas */
@supports(padding-bottom:env(safe-area-inset-bottom)){
  body{padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom))}
  .bot-nav{padding-bottom:env(safe-area-inset-bottom);height:calc(var(--nav-h) + env(safe-area-inset-bottom))}
}
@media(orientation:landscape){
  .p-header{height:42px;padding:7px 13px}
  .p-title{font-size:.8rem}
  .p-server-bar{padding:5px 12px}
  .p-notice{padding:4px 14px}
}

/* Toast */
.toast{position:fixed;bottom:calc(var(--nav-h) + 14px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg3);border:1px solid var(--border);border-radius:22px;padding:9px 18px;font-size:.76rem;color:var(--cyan);font-family:'Poppins',sans-serif;font-weight:600;opacity:0;transition:all .28s;z-index:900;white-space:nowrap;box-shadow:0 4px 18px rgba(0,0,0,.6);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Proxy status chip */
.proxy-chip{position:fixed;top:66px;right:10px;z-index:490;padding:3px 9px;border-radi
