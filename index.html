<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieMaza Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">MOVIE<span>MAZA</span></div>
        <input type="text" id="search" placeholder="Search movies (e.g. Avatar)...">
    </header>

    <div id="movie-grid" class="grid"></div>

    <div id="player-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <iframe id="video-player" src="" frameborder="0" sandbox="allow-forms allow-scripts allow-same-origin" allowfullscreen></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
