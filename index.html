<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharizardTV - Pro Streaming</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">CHARIZARD<span>TV</span></div>
        <div class="search-wrap">
            <input type="text" id="search" placeholder="Search Marvel, Anime, Series...">
            <button id="search-btn"><i class="fas fa-search"></i></button>
        </div>
    </header>

    <div class="category-nav">
        <button class="cat-btn active" data-type="movie">Movies</button>
        <button class="cat-btn" data-type="series">TV Shows</button>
        <button class="cat-btn" data-type="anime">Anime</button>
    </div>

    <section id="hero-banner"></section>

    <main>
        <h2 class="section-title">Trending Now <i class="fas fa-fire"></i></h2>
        <div id="movie-grid" class="horizontal-scroll"></div>

        <h2 class="section-title">New Releases</h2>
        <div id="new-grid" class="horizontal-scroll"></div>
    </main>

    <div id="player-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="video-container">
                <iframe id="video-player" src="" frameborder="0" allowfullscreen sandbox="allow-forms allow-scripts allow-same-origin"></iframe>
            </div>
            <div id="ep-panel">
                <h3>Select Episode</h3>
                <div id="ep-list" class="ep-grid"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
