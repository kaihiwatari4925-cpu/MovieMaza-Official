// 1. TURBO PROXY ROTATION (Eliminates "Loading..." hang)
async function fetchTurbo(url) {
    const proxies = [
        "https://api.allorigins.win/raw?url=", //
        "https://corsproxy.io/?",
        "https://api.proxyscrape.com/v2/?request="
    ];
    for (let proxy of proxies) {
        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 3500); // 3.5s Timeout
            const res = await fetch(proxy + encodeURIComponent(url), { signal: controller.signal });
            clearTimeout(timeout);
            if (res.ok) return await res.json();
        } catch (e) { console.warn("Proxy Fail, switching..."); }
    }

}

// 3. SANDBOXED PLAYER (Permanently blocks popup ads)
function playVideo(id, type, s = 1, e = 1) {

}
