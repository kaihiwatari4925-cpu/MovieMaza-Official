<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharizardTV Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">CHARIZARD<span>TV</span></div>
        <div class="search-box">
            <input type="text" id="search" placeholder="Search Marvel, Naruto, etc...">
            <button onclick="smartSearch()"><i class="fas fa-search"></i></button>
        </div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="showSection('movies')">Movies</button>
        <button class="tab-btn" onclick="showSection('series')">Web Series</button>
        <button class="tab-btn" onclick="showSection('anime')">Anime</button>
    </div>

    <div id="hero-banner"></div>

    <div id="movies-section" class="content-section active">
        <h2 class="title">Trending Movies</h2>
        <div id="movies-grid" class="horizontal-scroll"></div>
    </div>

    <div id="series-section" class="content-section">
        <h2 class="title">Popular TV Shows</h2>
        <div id="series-grid" class="horizontal-scroll"></div>
    </div>

    <div id="anime-section" class="content-section">
        <h2 class="title">Latest Anime</h2>
        <div id="anime-grid" class="horizontal-scroll"></div>
    </div>

    <div id="player-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closePlayer()">&times;</span>
            <iframe id="video-player" src="" frameborder="0" allowfullscreen></iframe>
            <div id="ep-panel">
                <h3>Select Episode</h3>
                <div id="ep-list" class="ep-grid"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
