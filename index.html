<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharizardTv - Stream Movies & Anime</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">CHARIZARD<span>TV</span></div>
        <div class="search-box">
            <input type="text" id="search" placeholder="Search Marvel, Anime, Series...">
        </div>
    </header>

    <div class="category-bar">
        <button class="cat-btn active" onclick="setMode('movie')">Movie</button>
        <button class="cat-btn" onclick="setMode('series')">TV</button>
        <button class="cat-btn" onclick="setMode('anime')">Anime</button>
    </div>

    <section id="hero-section"></section>

    <h2 class="section-title">Trending Now</h2>
    <div id="movie-grid" class="grid"></div>

    <div id="player-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="video-container">
                <iframe id="video-player" src="" frameborder="0" allowfullscreen sandbox="allow-forms allow-scripts allow-same-origin"></iframe>
            </div>
            <div id="episode-panel">
                <div class="panel-header">
                    <h3>Episodes</h3>
                    <select id="season-select" onchange="updateEpisodes()"></select>
                </div>
                <div id="episode-list" class="ep-grid"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
